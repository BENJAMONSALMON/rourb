<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - ROURB</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="login-card">
    <div class="card-left">
        <div class="brand">
            <h2><span>ROU</span><span>RB</span></h2>
            <p class="subtitle">Bienvenido a la app</p>
        </div>

        <form id="loginForm">
            <label>Email o nombre de usuario</label>
            <input type="text" id="username" placeholder="Ingresa tu correo o nombre de usuario" required>

            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <label class="checkbox-container">
                <input type="checkbox" id="togglePass" onclick="togglePassword()">
                Mostrar contraseña
            </label>

            <button type="submit" class="btn login">Iniciar sesión</button>
            <button type="button" class="btn register" onclick="window.location.href='/register'">¿No tienes cuenta?, Registrate</button>
        </form>
    </div>

    <div class="card-right">
        <img th:src="@{/img/logo.png}" alt="Logo Rourb" class="central-logo">
    </div>
</div>

<script>
    // Función para alternar visibilidad de contraseña
    function togglePassword() {
        const pass = document.getElementById("password");
        pass.type = (pass.type === "password") ? "text" : "password";
    }

    // Lógica de autenticación con el servidor
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => {
            if (!res.ok) throw new Error("Error en el login");
            return res.json();
        })
        .then(data => {
            localStorage.setItem("token", data.token);
            // Redirección según rol
            window.location.href = (data.role === "ROLE_SELLER") ? "/home-seller" : "/home-client";
        })
        .catch(err => {
            console.error(err);
            alert("Credenciales incorrectas o error de conexión.");
        });
    });
</script>

</body>
</html>
