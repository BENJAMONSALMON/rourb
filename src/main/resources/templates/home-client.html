<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROURB – Tienda</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
          --teal:#3dbfbf; --teal2:#2aa0a0; --red:#e84040;
          --card:#131313; --card2:#1a1a1a; --border:#222;
          --text:#e8e8e8; --muted:#666;
        }
        html, body { height:100%; font-family:'Outfit',sans-serif;
          background:radial-gradient(ellipse at 15% 40%,#0c2f2f 0%,#060f0f 50%,#020808 100%);
          color:var(--text); }

        .navbar { position:sticky; top:0; z-index:100;
          background:rgba(10,10,10,0.92); backdrop-filter:blur(14px);
          border-bottom:1px solid var(--border);
          display:flex; align-items:center; justify-content:space-between;
          padding:0 32px; height:60px; gap:16px; }
        .nav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.7rem;
          letter-spacing:4px; color:var(--text); text-decoration:none; }
        .nav-brand span { color:var(--teal); }
        .nav-right { display:flex; align-items:center; gap:10px; }
        .nav-user { display:flex; align-items:center; gap:8px; font-size:0.85rem; color:var(--muted); }
        .nav-user svg { color:var(--teal); }
        .nav-btn { display:flex; align-items:center; gap:6px; padding:8px 16px;
          border-radius:8px; border:none; font-family:'Outfit',sans-serif;
          font-size:0.82rem; font-weight:600; letter-spacing:0.05em; cursor:pointer; transition:all 0.2s; }
        .btn-cart { background:linear-gradient(135deg,var(--teal),var(--teal2)); color:#000; }
        .btn-cart:hover { filter:brightness(1.1); transform:translateY(-1px); }
        .cart-badge { background:#000; color:var(--teal); font-size:0.7rem;
          font-weight:700; border-radius:999px; padding:1px 6px; min-width:20px; text-align:center; }
        .btn-logout { background:transparent; border:1.5px solid var(--border); color:var(--muted); }
        .btn-logout:hover { border-color:var(--red); color:var(--red); }

        .main { max-width:1280px; margin:0 auto; padding:48px 32px; }
        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
        .section-title { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:3px; }
        .section-title span { color:var(--teal); }
        .product-count { font-size:0.8rem; color:var(--muted); background:var(--card);
          border:1px solid var(--border); border-radius:999px; padding:4px 12px; }

        .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:24px; }
        .product-card { background:var(--card); border:1px solid var(--border);
          border-radius:16px; overflow:hidden; cursor:pointer;
          transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
          animation:fadeIn 0.4s ease both; }
        .product-card:hover { transform:translateY(-5px);
          box-shadow:0 20px 60px rgba(0,0,0,0.6); border-color:rgba(61,191,191,0.35); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .card-img { width:100%; aspect-ratio:4/3; background:#0d1f1f;
          display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .card-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.35s; }
        .product-card:hover .card-img img { transform:scale(1.07); }
        .card-img-placeholder { font-size:4rem; opacity:0.2; }
        .card-body { padding:18px; display:flex; flex-direction:column; gap:10px; }
        .card-name { font-weight:600; font-size:1rem; line-height:1.3; }
        .card-desc { font-size:0.8rem; color:var(--muted); line-height:1.5;
          display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .card-meta { display:flex; align-items:center; justify-content:space-between; }
        .card-price { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:1px; color:var(--teal); }
        .card-stock { font-size:0.72rem; color:var(--muted); }
        .card-add { width:100%; padding:11px;
          background:linear-gradient(135deg,var(--teal),var(--teal2));
          border:none; border-radius:8px; color:#000;
          font-family:'Outfit',sans-serif; font-size:0.83rem; font-weight:700;
          letter-spacing:0.06em; text-transform:uppercase; cursor:pointer;
          transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
        .card-add:hover { filter:brightness(1.12); transform:translateY(-1px); }

        /* MODAL PRODUCTO */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
          backdrop-filter:blur(8px); z-index:300; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:var(--card); border:1px solid var(--border); border-radius:20px;
          width:min(560px,94vw); max-height:90vh; overflow-y:auto; animation:popIn 0.25s ease; }
        @keyframes popIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
        .modal-img { width:100%; aspect-ratio:16/9; background:#0d1f1f;
          display:flex; align-items:center; justify-content:center; overflow:hidden;
          border-radius:20px 20px 0 0; }
        .modal-img img { width:100%; height:100%; object-fit:cover; }
        .modal-img-placeholder { font-size:6rem; opacity:0.2; }
        .modal-body { padding:28px; display:flex; flex-direction:column; gap:16px; }
        .modal-name { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:2px; }
        .modal-desc { font-size:0.9rem; color:var(--muted); line-height:1.7; }
        .modal-meta { display:flex; align-items:center; gap:20px; }
        .modal-price { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--teal); }
        .modal-stock { font-size:0.82rem; color:var(--muted);
          background:var(--card2); border:1px solid var(--border); border-radius:999px; padding:4px 12px; }
        .modal-actions { display:flex; gap:10px; }
        .btn-modal-add { flex:1; padding:13px;
          background:linear-gradient(135deg,var(--teal),var(--teal2));
          border:none; border-radius:10px; color:#000; font-family:'Outfit',sans-serif;
          font-size:0.9rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
        .btn-modal-add:hover { filter:brightness(1.1); transform:translateY(-1px); }
        .btn-modal-close { padding:13px 18px; background:transparent;
          border:1.5px solid var(--border); border-radius:10px; color:var(--muted);
          font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; }
        .btn-modal-close:hover { border-color:var(--red); color:var(--red); }

        /* CART DRAWER */
        .cart-overlay { display:none; position:fixed; inset:0;
          background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:200; }
        .cart-overlay.open { display:block; }
        .cart-drawer { position:fixed; top:0; right:0; bottom:0; width:380px;
          background:var(--card); border-left:1px solid var(--border);
          display:flex; flex-direction:column; z-index:201;
          transform:translateX(100%); transition:transform 0.3s ease; }
        .cart-drawer.open { transform:translateX(0); }
        .cart-header { display:flex; align-items:center; justify-content:space-between;
          padding:20px 24px; border-bottom:1px solid var(--border); }
        .cart-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; }
        .cart-close { background:none; border:none; color:var(--muted);
          font-size:1.4rem; cursor:pointer; transition:color 0.15s; }
        .cart-close:hover { color:var(--red); }
        .cart-items { flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:12px; }
        .cart-empty { text-align:center; padding:60px 0; color:var(--muted); font-size:0.9rem; }
        .cart-item { display:flex; align-items:center; gap:12px; background:var(--card2);
          border:1px solid var(--border); border-radius:10px; padding:12px; }
        .cart-item-thumb { width:44px; height:44px; background:#0d1f1f; border-radius:8px;
          overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center;
          font-size:1.4rem; }
        .cart-item-thumb img { width:100%; height:100%; object-fit:cover; }
        .cart-item-info { flex:1; }
        .cart-item-name { font-size:0.85rem; font-weight:600; margin-bottom:2px; }
        .cart-item-price { font-size:0.8rem; color:var(--teal); }
        .cart-item-qty { display:flex; align-items:center; gap:8px; }
        .qty-btn { background:var(--border); border:none; color:var(--text);
          width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:1rem;
          display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
        .qty-btn:hover { background:var(--teal); color:#000; }
        .cart-footer { padding:20px 24px; border-top:1px solid var(--border); }
        .cart-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .cart-total-label { font-size:0.85rem; color:var(--muted); }
        .cart-total-value { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--teal); }
        .btn-checkout { width:100%; padding:14px;
          background:linear-gradient(135deg,var(--teal),var(--teal2));
          border:none; border-radius:10px; color:#000; font-family:'Outfit',sans-serif;
          font-size:0.9rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
        .btn-checkout:hover { filter:brightness(1.1); transform:translateY(-1px); }
        .btn-checkout:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

        /* CHECKOUT MODAL */
        .checkout-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
          backdrop-filter:blur(8px); z-index:400; align-items:center; justify-content:center; }
        .checkout-modal.open { display:flex; }
        .checkout-box { background:var(--card); border:1px solid var(--border);
          border-radius:20px; width:min(480px,94vw); max-height:90vh; overflow-y:auto;
          padding:32px; display:flex; flex-direction:column; gap:16px; animation:popIn 0.25s ease; }
        .checkout-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:2px; }
        .checkout-section { font-size:0.72rem; color:var(--teal); text-transform:uppercase;
          letter-spacing:0.15em; font-weight:600; }
        .field-group { display:flex; flex-direction:column; gap:6px; }
        .field-group label { font-size:0.75rem; color:var(--muted);
          text-transform:uppercase; letter-spacing:0.08em; }
        .field-group input, .field-group select {
          padding:11px 14px; border-radius:8px; border:1px solid var(--border);
          background:var(--card2); color:var(--text); font-family:'Outfit',sans-serif;
          font-size:0.9rem; outline:none; transition:border-color 0.2s; }
        .field-group input:focus, .field-group select:focus { border-color:var(--teal); }
        .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .checkout-summary { background:var(--card2); border:1px solid var(--border);
          border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:8px; }
        .summary-row { display:flex; justify-content:space-between; font-size:0.85rem; color:var(--muted); }
        .summary-row.total { font-weight:600; color:var(--teal);
          font-family:'Bebas Neue',sans-serif; font-size:1.1rem;
          border-top:1px solid var(--border); padding-top:8px; margin-top:4px; }
        .checkout-actions { display:flex; gap:10px; }
        .btn-confirm { flex:1; padding:13px;
          background:linear-gradient(135deg,var(--teal),var(--teal2));
          border:none; border-radius:10px; color:#000; font-family:'Outfit',sans-serif;
          font-size:0.9rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
        .btn-confirm:hover { filter:brightness(1.1); }
        .btn-back { padding:13px 18px; background:transparent;
          border:1.5px solid var(--border); border-radius:10px; color:var(--muted);
          font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; }
        .btn-back:hover { border-color:var(--text); color:var(--text); }

        .cart-toast { position:fixed; bottom:24px; right:24px; background:var(--card);
          border:1px solid var(--teal); border-radius:12px; padding:14px 20px;
          font-size:0.85rem; box-shadow:0 8px 32px rgba(0,0,0,0.5); opacity:0;
          transform:translateY(12px); transition:all 0.3s; pointer-events:none; z-index:999; }
        .cart-toast.show { opacity:1; transform:translateY(0); }
        .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--muted); }
        .empty-state .icon { font-size:3rem; margin-bottom:16px; opacity:0.4; }

        @media(max-width:640px) {
          .navbar { padding:0 16px; }
          .main { padding:28px 16px; }
          .product-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
          .cart-drawer { width:100%; }
          .field-row { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="nav-brand" href="#">RO<span>URB</span></a>
    <div class="nav-right">
        <div class="nav-user">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="username-display">-</span>
        </div>
        <button class="nav-btn btn-cart" onclick="openCart()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Carrito <span class="cart-badge" id="cart-count">0</span>
        </button>
        <button class="nav-btn btn-logout" onclick="location.href='/login'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Salir
        </button>
    </div>
</nav>

<div class="main">
    <div class="section-header">
        <h1 class="section-title">Productos <span>Disponibles</span></h1>
        <div class="product-count" id="prod-count">Cargando...</div>
    </div>
    <div class="product-grid" id="product-grid">
        <div class="empty-state"><div class="icon">⏳</div><p>Cargando productos...</p></div>
    </div>
</div>

<div class="modal-overlay" id="modal-product" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="modal-product-box">
        <div class="modal-img" id="modal-img-wrap">
            <div class="modal-img-placeholder">📦</div>
        </div>
        <div class="modal-body">
            <div class="modal-name" id="modal-prod-name">-</div>
            <div class="modal-desc" id="modal-prod-desc">-</div>
            <div class="modal-meta">
                <div class="modal-price" id="modal-prod-price">Q0.00</div>
                <div class="modal-stock" id="modal-prod-stock">0 disponibles</div>
            </div>
            <div class="modal-actions">
                <button class="btn-modal-add" onclick="addCurrentToCart()">
                    + Agregar al carrito
                </button>
                <button class="btn-modal-close" onclick="closeProductModal()">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
        <span class="cart-title">Tu Carrito</span>
        <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cart-items">
        <div class="cart-empty">Tu carrito está vacío</div>
    </div>
    <div class="cart-footer">
        <div class="cart-total">
            <span class="cart-total-label">Total estimado</span>
            <span class="cart-total-value" id="cart-total">Q0.00</span>
        </div>
        <button class="btn-checkout" id="btn-checkout" onclick="openCheckout()" disabled>
            Finalizar compra
        </button>
    </div>
</div>

<div class="checkout-modal" id="checkout-modal">
    <div class="checkout-box">
        <div class="checkout-title">Finalizar Pedido</div>

        <div class="checkout-section">Datos del cliente</div>

        <div class="field-row">
            <div class="field-group">
                <label>Nombre *</label>
                <input type="text" id="co-name" placeholder="Tu nombre">
            </div>
            <div class="field-group">
                <label>Apellido</label>
                <input type="text" id="co-lastname" placeholder="Tu apellido">
            </div>
        </div>
        <div class="field-row">
            <div class="field-group">
                <label>DPI *</label>
                <input type="number" id="co-dpi" placeholder="Número de DPI">
            </div>
            <div class="field-group">
                <label>Estado</label>
                <select id="co-state">
                    <option value="ACTIVE">Activo</option>
                    <option value="INACTIVE">Inactivo</option>
                </select>
            </div>
        </div>
        <div class="field-group">
            <label>Dirección de entrega *</label>
            <input type="text" id="co-address" placeholder="Calle, zona, municipio, departamento">
        </div>

        <div class="checkout-section">Resumen del pedido</div>
        <div class="checkout-summary" id="checkout-summary"></div>

        <div class="checkout-actions">
            <button class="btn-back" onclick="closeCheckout()">← Volver</button>
            <button class="btn-confirm" onclick="confirmCheckout()">Confirmar pedido</button>
        </div>
    </div>
</div>

<div class="cart-toast" id="cart-toast"></div>

<script src="js/clients.js"></script>
</body>
</html>
